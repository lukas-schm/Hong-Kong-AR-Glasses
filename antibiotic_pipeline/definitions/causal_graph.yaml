metadata:
  title: "Antibiotic Continuation Decision — Causal Graph"
  clinical_question: >
    At 72h in ICU suspected sepsis, should broad-spectrum antibiotics be
    continued (arm 0), de-escalated (arm 1), or stopped (arm 2)?
  time_zero: "72 hours after first broad-spectrum antibiotic order"
  population: "ICU patients ≥18y, sepsis-3, on broad-spectrum antibiotics, alive at 72h"
  identification_assumption: >
    Backdoor criterion: conditional ignorability given W at time zero.
    All causal paths from T to Y are blocked by conditioning on W.
  reference: "CHAI Hub Research Call 2 — Novak et al. 2026"
  version: "1.0"

# ── Treatment definition ────────────────────────────────────────────────────
treatment:
  variable: treatment_arm
  type: categorical_3arm
  classification_window_hours: 12  # look ±12h around time_zero
  arms:
    - id: 0
      label: continue
      description: "Broad-spectrum antibiotic active within classification window"
      drug_classes: [carbapenems, glycopeptides, broad_betalactams, aminoglycosides]
    - id: 1
      label: deescalate
      description: "Only narrow-spectrum antibiotics in window (broad-spectrum stopped)"
      drug_classes: [narrow_betalactams, nitroimidazoles, macrolides, sulfonamides]
    - id: 2
      label: stop
      description: "No antibiotic orders active in classification window"
      drug_classes: []
  drug_lists:
    carbapenems:       [meropenem, imipenem, ertapenem, doripenem]
    glycopeptides:     [vancomycin, linezolid, daptomycin]
    broad_betalactams: [piperacillin, cefepime, ceftazidime, ceftriaxone, ampicillin-sulbactam]
    aminoglycosides:   [gentamicin, amikacin, tobramycin]
    narrow_betalactams: [ampicillin, cefazolin, cephalexin]
    nitroimidazoles:   [metronidazole]
    macrolides:        [azithromycin, clarithromycin]
    sulfonamides:      [trimethoprim, nitrofurantoin]
  source:
    derived_table: antibiotic    # mimiciv_derived.antibiotic from mimic-code
    raw_table: prescriptions
    key_columns: [drug, starttime, stoptime]

# ── Outcomes ────────────────────────────────────────────────────────────────
outcomes:
  - variable: mortality_28days
    type: binary
    label: "28-day mortality"
    primary: true
    computation: "dod - time_zero <= 28 days"
    source_table: patients
    source_column: dod
    follow_up_days: 28

  # WS11: mortality-trajectory family. Same cohort denominator as the
  # 28-day endpoint (F16 censoring NaN's all four horizons together).
  # Used for the descriptive trajectory chart in the CDSS and as
  # secondary endpoints (BH-adjusted within the trajectory family).
  - variable: mortality_7d
    type: binary
    label: "7-day mortality (trajectory endpoint)"
    primary: false
    computation: "dod - time_zero <= 7 days; NaN if mortality_28days is NaN"
    source_table: patients
    source_column: dod
    follow_up_days: 7

  - variable: mortality_14d
    type: binary
    label: "14-day mortality (trajectory endpoint)"
    primary: false
    computation: "dod - time_zero <= 14 days; NaN if mortality_28days is NaN"
    source_table: patients
    source_column: dod
    follow_up_days: 14

  - variable: mortality_21d
    type: binary
    label: "21-day mortality (trajectory endpoint)"
    primary: false
    computation: "dod - time_zero <= 21 days; NaN if mortality_28days is NaN"
    source_table: patients
    source_column: dod
    follow_up_days: 21

  - variable: ventilator_free_days_28
    type: continuous
    range: [0, 28]
    label: "Ventilator-free days at 28"
    computation: >
      0 if patient dies within 28d of time_zero;
      else 28 minus total days on mechanical ventilation after time_zero
    source_table: ventilation    # mimiciv_derived
    follow_up_days: 28

  - variable: vasopressor_free_days_28
    type: continuous
    range: [0, 28]
    label: "Vasopressor-free days at 28"
    computation: >
      0 if patient dies within 28d of time_zero;
      else 28 minus total days on any vasopressor after time_zero
    source_table: vasoactive_agent    # mimiciv_derived
    follow_up_days: 28

  - variable: icu_los_days
    type: continuous
    range: [0, 28]
    label: "ICU length of stay from time zero (days, censored at 28)"
    computation: "(outtime - time_zero) in days, clipped to 28"
    source_table: icustays
    source_column: outtime
    follow_up_days: 28

  - variable: aki_worsening
    type: binary
    label: "AKI worsening after time zero"
    computation: >
      1 if max(aki_stage in [time_zero+1d, time_zero+7d]) > aki_stage_at_decision, else 0
    source_table: kdigo_stages    # mimiciv_derived
    follow_up_days: 7

  - variable: secondary_infection
    type: binary
    label: "New positive blood or respiratory culture >7d after time zero"
    computation: >
      1 if any culture with org_name not null, collected > time_zero + 7d,
      from blood or respiratory specimen
    source_table: microbiologyevents
    follow_up_days: 28

# ── Confounders ─────────────────────────────────────────────────────────────
# Each confounder: variable name, group, type, MIMIC source, aggregation method,
# and clinical justification for inclusion as a confounder (not mediator).
confounders:

  # ── Group 1: Illness severity at time zero ─────────────────────────────
  - variable: SOFA_at_decision
    group: illness_severity
    type: continuous
    range: [0, 24]
    label: "SOFA score at 72h"
    identification_type: measured
    aggregation: last_before_decision
    source_table: sofa          # mimiciv_derived.sofa
    source_column: sofa_24hours
    clinical_justification: >
      SOFA at time zero is the primary driver of clinician antibiotic decisions AND
      a direct predictor of mortality. Must be adjusted for to avoid confounding by
      indication. (Smit et al., 2023; Feuerriegel et al., 2024)

  - variable: SAPSII
    group: illness_severity
    type: continuous
    range: [0, 163]
    label: "SAPS II severity score (first day of ICU stay)"
    identification_type: measured
    aggregation: first_in_stay
    source_table: sapsii        # mimiciv_derived.sapsii
    source_column: sapsii
    clinical_justification: >
      Admission severity captures baseline risk independent of post-admission treatment.
      Used as a proxy for unmeasured severity at admission.

  - variable: lactate_at_decision
    group: illness_severity
    type: continuous
    range: [0, 20]
    label: "Serum lactate at 72h (mmol/L)"
    identification_type: measured
    aggregation: last_before_decision
    source_table: chemistry     # mimiciv_derived.chemistry
    source_column: lactate
    clinical_justification: >
      Hyperlactatemia indicates tissue hypoperfusion and is a criterion for
      septic shock. Strongly influences antibiotic continuation.

  - variable: vasopressors_at_decision
    group: illness_severity
    type: binary
    label: "On vasopressors at 72h"
    identification_type: measured
    aggregation: active_at_decision
    source_table: vasoactive_agent   # mimiciv_derived
    source_column: vaso_rate
    clinical_justification: >
      Vasopressor dependence defines septic shock and strongly influences clinician
      willingness to de-escalate antibiotics.

  - variable: MAP_at_decision
    group: illness_severity
    type: continuous
    range: [30, 150]
    label: "Mean arterial pressure at 72h (mmHg)"
    identification_type: measured
    aggregation: last_before_decision
    source_table: vitalsign     # mimiciv_derived
    source_column: mbp

  # ── Group 2: Infection certainty ───────────────────────────────────────
  - variable: WBC_at_decision
    group: infection_certainty
    type: continuous
    range: [0, 100]
    label: "White blood cell count at 72h (10³/μL)"
    identification_type: measured
    aggregation: last_before_decision
    source_table: complete_blood_count   # mimiciv_derived
    source_column: wbc
    clinical_justification: >
      Leukocytosis/leukopenia are cardinal SIRS criteria and influence antibiotic
      continuation. Normalising WBC encourages de-escalation.

  - variable: CRP_at_decision
    group: infection_certainty
    type: continuous
    range: [0, 500]
    label: "C-reactive protein at 72h (mg/L)"
    identification_type: measured
    aggregation: last_before_decision
    source_table: inflammation   # mimiciv_derived (from labevents itemid 50889)
    source_column: crp
    note: >
      Procalcitonin (PCT) is not consistently available in MIMIC-IV.
      CRP is used as the infection biomarker proxy.

  - variable: temperature_at_decision
    group: infection_certainty
    type: continuous
    range: [34, 42]
    label: "Body temperature at 72h (°C)"
    identification_type: measured
    aggregation: last_before_decision
    source_table: vitalsign
    source_column: temperature

  - variable: positive_blood_culture
    group: infection_certainty
    type: binary
    label: "Positive blood culture before time zero"
    identification_type: measured
    aggregation: any_before_decision
    source_table: microbiologyevents
    filter_sql: "spec_type_desc ILIKE '%blood%' AND org_name IS NOT NULL"
    clinical_justification: >
      A positive blood culture confirms bacteraemia and is the strongest driver of
      antibiotic continuation decisions. Documented in WP2 of the CHAI proposal.

  - variable: culture_gram_positive
    group: infection_certainty
    type: binary
    label: "Gram-positive bacteraemia"
    identification_type: measured
    aggregation: any_before_decision
    source_table: microbiologyevents
    filter_sql: >
      spec_type_desc ILIKE '%blood%' AND
      (org_name ILIKE '%staphylococcus%' OR org_name ILIKE '%streptococcus%'
       OR org_name ILIKE '%enterococcus%')

  - variable: culture_gram_negative
    group: infection_certainty
    type: binary
    label: "Gram-negative bacteraemia"
    identification_type: measured
    aggregation: any_before_decision
    source_table: microbiologyevents
    filter_sql: >
      spec_type_desc ILIKE '%blood%' AND
      (org_name ILIKE '%klebsiella%' OR org_name ILIKE '%escherichia%'
       OR org_name ILIKE '%pseudomonas%' OR org_name ILIKE '%acinetobacter%'
       OR org_name ILIKE '%enterobacter%')

  - variable: infection_source_pulmonary
    group: infection_certainty
    type: binary
    label: "Pulmonary infection source"
    identification_type: measured
    aggregation: any_before_decision
    source_table: microbiologyevents
    filter_sql: >
      spec_type_desc ILIKE '%sputum%' OR spec_type_desc ILIKE '%bronch%'
      OR spec_type_desc ILIKE '%bal%' OR spec_type_desc ILIKE '%tracheal%'

  - variable: infection_source_urinary
    group: infection_certainty
    type: binary
    label: "Urinary infection source"
    identification_type: measured
    aggregation: any_before_decision
    source_table: microbiologyevents
    filter_sql: "spec_type_desc ILIKE '%urine%'"

  - variable: infection_source_abdominal
    group: infection_certainty
    type: binary
    label: "Abdominal/wound infection source"
    identification_type: measured
    aggregation: any_before_decision
    source_table: microbiologyevents
    filter_sql: >
      spec_type_desc ILIKE '%peritoneal%' OR spec_type_desc ILIKE '%bile%'
      OR spec_type_desc ILIKE '%wound%' OR spec_type_desc ILIKE '%abscess%'

  # ── Group 3: Organ dysfunction ─────────────────────────────────────────
  - variable: AKI_stage_at_decision
    group: organ_dysfunction
    type: categorical
    categories: [0, 1, 2, 3]
    label: "KDIGO AKI stage at 72h"
    identification_type: measured
    aggregation: last_before_decision
    source_table: kdigo_stages   # mimiciv_derived
    source_column: aki_stage
    clinical_justification: >
      Renal dysfunction affects antibiotic dosing and selection (dose reduction for
      renally cleared drugs) and is a direct predictor of ICU outcomes.

  - variable: pf_ratio_at_decision
    group: organ_dysfunction
    type: continuous
    range: [50, 600]
    label: "PaO2/FiO2 ratio at 72h"
    identification_type: measured
    aggregation: last_before_decision
    source_table: bg             # mimiciv_derived
    source_column: pao2fio2ratio

  - variable: ventilation_at_decision
    group: organ_dysfunction
    type: binary
    label: "Mechanical ventilation at 72h"
    identification_type: measured
    aggregation: active_at_decision
    source_table: ventilation    # mimiciv_derived

  - variable: creatinine_at_decision
    group: organ_dysfunction
    type: continuous
    range: [0.2, 20]
    label: "Serum creatinine at 72h (mg/dL)"
    identification_type: measured
    aggregation: last_before_decision
    source_table: chemistry
    source_column: creatinine

  - variable: bilirubin_at_decision
    group: organ_dysfunction
    type: continuous
    range: [0, 30]
    label: "Total bilirubin at 72h (mg/dL)"
    identification_type: measured
    aggregation: last_before_decision
    source_table: enzyme         # mimiciv_derived
    source_column: bilirubin_total

  # ── Group 4: Treatment history ─────────────────────────────────────────
  - variable: days_on_abx
    group: treatment_history
    type: continuous
    range: [0, 4]
    label: "Days on broad-spectrum antibiotics before time zero"
    identification_type: measured
    aggregation: duration_before_decision
    source_table: antibiotic     # mimiciv_derived
    clinical_justification: >
      Duration of prior antibiotic exposure reflects clinician confidence in treatment
      adequacy and shapes resistance risk perception.

  - variable: prior_carbapenem
    group: treatment_history
    type: binary
    label: "Carbapenem prescribed before time zero"
    identification_type: measured
    aggregation: any_before_decision
    source_table: antibiotic
    filter_sql: "antibiotic ILIKE ANY ('%meropenem%', '%imipenem%', '%ertapenem%', '%doripenem%')"

  - variable: prior_glycopeptide
    group: treatment_history
    type: binary
    label: "Glycopeptide/anti-MRSA agent before time zero"
    identification_type: measured
    aggregation: any_before_decision
    source_table: antibiotic
    filter_sql: "antibiotic ILIKE ANY ('%vancomycin%', '%linezolid%', '%daptomycin%')"

  - variable: prior_betalactam
    group: treatment_history
    type: binary
    label: "Broad-spectrum beta-lactam before time zero"
    identification_type: measured
    aggregation: any_before_decision
    source_table: antibiotic
    filter_sql: >
      antibiotic ILIKE ANY ('%piperacillin%', '%cefepime%', '%ceftazidime%',
      '%ceftriaxone%', '%ampicillin-sulbactam%')

  - variable: prior_aminoglycoside
    group: treatment_history
    type: binary
    label: "Aminoglycoside before time zero"
    identification_type: measured
    aggregation: any_before_decision
    source_table: antibiotic
    filter_sql: "antibiotic ILIKE ANY ('%gentamicin%', '%amikacin%', '%tobramycin%')"

  # ── Group 5: Clinical trajectory (admission → 72h) ─────────────────────
  - variable: delta_SOFA_0_72h
    group: trajectory
    type: continuous
    label: "Change in SOFA from admission to 72h (negative = improving)"
    identification_type: measured
    aggregation: last_minus_first_in_window
    source_table: sofa
    source_column: sofa_24hours
    clinical_justification: >
      SOFA trajectory is a key surrogate for treatment response. Improving patients
      (delta < 0) are more likely to be de-escalated. This is a snapshot encoding of
      time-varying confounding at time zero.

  - variable: delta_WBC_0_72h
    group: trajectory
    type: continuous
    label: "Change in WBC from admission to 72h (10³/μL)"
    identification_type: measured
    aggregation: last_minus_first_in_window
    source_table: complete_blood_count
    source_column: wbc

  - variable: delta_lactate_0_72h
    group: trajectory
    type: continuous
    label: "Change in serum lactate from admission to 72h (mmol/L)"
    identification_type: measured
    aggregation: last_minus_first_in_window
    source_table: chemistry
    source_column: lactate

  - variable: delta_temperature_0_72h
    group: trajectory
    type: continuous
    label: "Change in temperature from admission to 72h (°C)"
    identification_type: measured
    aggregation: last_minus_first_in_window
    source_table: vitalsign
    source_column: temperature

  - variable: delta_creatinine_0_72h
    group: trajectory
    type: continuous
    label: "Change in creatinine from admission to 72h (mg/dL)"
    identification_type: measured
    aggregation: last_minus_first_in_window
    source_table: chemistry
    source_column: creatinine

  # ── Group 6: Demographics ───────────────────────────────────────────────
  - variable: admission_age
    group: demographics
    type: continuous
    range: [18, 91]
    label: "Age at ICU admission (years)"
    identification_type: measured
    aggregation: static
    source_table: patients
    source_column: anchor_age

  - variable: Female
    group: demographics
    type: binary
    label: "Female sex"
    identification_type: measured
    aggregation: static
    source_table: patients
    source_column: gender
    coding: "1 if gender == 'F' else 0"

  - variable: immunosuppressed
    group: demographics
    type: binary
    label: "Immunosuppression (malignancy, AIDS, or transplant)"
    identification_type: measured
    aggregation: static
    source_table: charlson       # mimiciv_derived
    coding: >
      1 if malignant_cancer > 0 OR metastatic_solid_tumor > 0 OR aids > 0

  - variable: charlson_comorbidity_index
    group: demographics
    type: continuous
    range: [0, 24]
    label: "Charlson Comorbidity Index"
    identification_type: measured
    aggregation: static
    source_table: charlson
    source_column: charlson_comorbidity_index

  - variable: emergency_admission
    group: demographics
    type: binary
    label: "Emergency hospital admission"
    identification_type: measured
    aggregation: static
    source_table: admissions
    source_column: admission_type
    coding: "1 if 'EMERGENCY' in admission_type.upper() else 0"

  # ── Group 7: Clinical intent (WS4 additions) ────────────────────────────
  # Reviewer concern #1 / #2: the stewardship decision is deeply entangled
  # with code-status, palliative trajectory, and ID-consultation input.
  # These are partial proxies. Patients in CMO at T0 are excluded from the
  # analytic cohort (see framing module), not adjusted for.
  # Code status is emitted as one-hot binary columns (rather than a string
  # category) so that downstream median imputation does not choke on the
  # categorical type. The CMO category is *excluded* from the cohort
  # upstream — it is not included as a confounder here.
  - variable: code_status_full_code
    group: clinical_intent
    type: binary
    label: "Code status at T0: full code"
    identification_type: measured
    aggregation: last_before_decision
    source_table: chartevents
    filter_sql: "itemid = 223758 AND value ILIKE 'full code'"
    clinical_justification: >
      Code-status documentation reflects clinician/family treatment-intent at T0.
      DNR/DNI categories shift treatment decisions in ways not captured by
      severity scores (reviewer concern #1).

  - variable: code_status_dnr
    group: clinical_intent
    type: binary
    label: "Code status at T0: DNR"
    identification_type: measured
    aggregation: last_before_decision
    source_table: chartevents
    filter_sql: "itemid = 223758 AND value ILIKE 'dnr (do not resuscitate)'"

  - variable: code_status_dni
    group: clinical_intent
    type: binary
    label: "Code status at T0: DNI"
    identification_type: measured
    aggregation: last_before_decision
    source_table: chartevents
    filter_sql: "itemid = 223758 AND value ILIKE 'dni (do not intubate)'"

  - variable: code_status_dnr_dni
    group: clinical_intent
    type: binary
    label: "Code status at T0: DNR / DNI"
    identification_type: measured
    aggregation: last_before_decision
    source_table: chartevents
    filter_sql: "itemid = 223758 AND value ILIKE 'dnr / dni'"

  - variable: code_status_unknown
    group: clinical_intent
    type: binary
    label: "Code status at T0: undocumented"
    identification_type: measured
    aggregation: last_before_decision
    source_table: chartevents
    filter_sql: "itemid = 223758 (no value observed)"
    note: >
      ~52% of stays have no code-status documentation at T0 in MIMIC-IV;
      this is the missingness flag (kept as an informative covariate per
      WS4 / F5).

  - variable: palliative_transition_pre_T0
    group: clinical_intent
    type: binary
    label: "Palliative-care consult before T0"
    identification_type: measured
    aggregation: any_before_decision
    source_table: poe
    filter_sql: "order_type='Consults' AND order_subtype LIKE 'Palliative%'"
    clinical_justification: >
      A palliative consult before T0 is a documented indicator of goals-of-care
      transition; closely related to the unmeasured 'palliative-intent withdrawal'
      reviewer flag (#1).

  - variable: id_consult_pre_T0
    group: clinical_intent
    type: binary
    label: "Infectious-disease consult before T0"
    identification_type: measured
    aggregation: any_before_decision
    source_table: poe
    filter_sql: "order_type='Consults' AND order_subtype='Infectious Disease'"
    note: >
      Coverage in MIMIC-IV varies by service; we treat absence as 0 and
      acknowledge the resulting differential measurement error in the manuscript.
    clinical_justification: >
      ID consult is a known driver of de-escalation and discontinuation decisions.

  - variable: source_control_pre_T0
    group: clinical_intent
    type: binary
    label: "Source-control procedure before T0"
    identification_type: measured
    aggregation: any_before_decision
    source_table: procedureevents
    filter_sql: >
      itemid IN (225433, 225445, 225479, 225447, 226475, 225805)
    clinical_justification: >
      Successful source control is a clinical pre-condition for antibiotic
      de-escalation/cessation. Itemid list is verified against mimic-iv
      d_items: 225433 Chest Tube Placed, 225445 Paracentesis,
      225479 Thoracentesis, 225447 Percutaneous Drain Insertion,
      226475 Intraventricular Drain Inserted, 225805 Peritoneal Dialysis.
      Versioned in ``variables/clinical_intent.py``
      (SOURCE_CONTROL_ITEMIDS).

# ── Unmeasured confounders ───────────────────────────────────────────────────
# Documented for transparency and sensitivity analysis planning.
unmeasured_confounders:
  - variable: clinician_gestalt
    threat_level: high
    description: >
      Bedside clinical judgement not captured in the EHR. Clinicians may continue
      antibiotics based on perceived trajectory or appearance not reflected in charted data.
    sensitivity_approach: "E-value analysis; negative control outcome analysis"

  - variable: microbiological_pending
    threat_level: medium
    description: >
      Culture results ordered before 72h but not yet resulted. Clinicians may continue
      broad-spectrum therapy while awaiting pending results.
    sensitivity_approach: >
      Subgroup analysis: restrict to patients with at least one resulted culture before 72h.
      Compare estimates to main analysis.

  - variable: imaging_findings
    threat_level: medium
    description: >
      Radiology results (chest X-ray infiltrates, CT-confirmed collections) influence
      antibiotic decisions but are not consistently structured in MIMIC-IV.
    sensitivity_approach: >
      Proxy: use presence of pulmonary/abdominal infection source flags as indirect indicator.

  - variable: antibiotic_allergy
    threat_level: low
    description: "Drug allergy history exists in MIMIC-IV but is inconsistently coded."
    sensitivity_approach: >
      Sensitivity analysis: exclude patients with ICD codes indicating beta-lactam or
      carbapenem allergy (Z88.*).

  - variable: bedside_frailty_gestalt
    threat_level: high
    description: >
      Clinician bedside-gestalt frailty assessment ("looks unwell", "trajectory off")
      is not captured in any structured EHR field. Reviewer concern #1: this is the
      single strongest plausible residual confounder for the cessation effect; an
      E-value of ~1.3-1.5 is well within the range of a frailty-axis confounder
      in ICU populations.
    sensitivity_approach: >
      No proxy available. E-value reporting; tipping-point sensitivity analysis;
      framework treats the estimate as exploratory.

  - variable: undocumented_improvement
    threat_level: high
    description: >
      Clinician-observed improvement that drives discontinuation but is not yet
      reflected in structured vital-sign or lab fields at T0. Reviewer concern #1.
    sensitivity_approach: >
      Trajectory deltas (delta_SOFA, delta_lactate, delta_temperature) partially
      capture this; the residual is unobservable.

  - variable: goals_of_care_reasoning
    threat_level: medium
    description: >
      Full goals-of-care reasoning (family meeting content, prognostic discussion
      nuance) is in free-text notes only. Reviewer concern #1. We partially proxy
      with structured code-status and palliative-consult flags (WS4), but the
      reasoning layer remains unobserved.
    sensitivity_approach: "Code-status + palliative-consult proxies; CMO exclusion."

  - variable: microbiology_certainty
    threat_level: medium
    description: >
      Real-time clinician interpretation of microbiology results (contamination
      suspicion, polymicrobial significance) is not structured. Reviewer concern #1.
    sensitivity_approach: >
      Subgroup analysis: stratify by 'any culture resulted before T0' flag.

# ── DAG edges (within confounders) ──────────────────────────────────────────
# These encode known clinical causal relationships among confounders.
# Direction: [cause, effect]
dag_edges:
  within_confounders:
    - [positive_blood_culture, SOFA_at_decision]
    - [SOFA_at_decision, AKI_stage_at_decision]
    - [SOFA_at_decision, ventilation_at_decision]
    - [SOFA_at_decision, vasopressors_at_decision]
    - [SOFA_at_decision, delta_SOFA_0_72h]
    - [WBC_at_decision, delta_WBC_0_72h]
    - [lactate_at_decision, delta_lactate_0_72h]
    - [creatinine_at_decision, delta_creatinine_0_72h]
    - [temperature_at_decision, delta_temperature_0_72h]
    - [charlson_comorbidity_index, positive_blood_culture]
    - [immunosuppressed, culture_gram_positive]
    - [immunosuppressed, culture_gram_negative]
    - [days_on_abx, positive_blood_culture]
    - [prior_carbapenem, culture_gram_negative]
    - [AKI_stage_at_decision, creatinine_at_decision]

# ── CATE heterogeneity features ─────────────────────────────────────────────
# These are the features used to estimate subgroup-level CATE.
cate_features:
  - admission_age       # binned at 65 for subgroup summary
  - Female
  - SOFA_at_decision    # binned at median for subgroup summary
  - delta_SOFA_0_72h    # binned at 0 (improving vs worsening)
  - positive_blood_culture
  - immunosuppressed

# ── Sensitivity analysis feature sets ───────────────────────────────────────
sensitivity_feature_sets:
  all_confounders:
    description: "Full adjustment set — all measured confounders"
    exclude_groups: []

  no_infection_markers:
    description: "Remove infection certainty group (tests omission of culture/biomarker data)"
    exclude_groups: [infection_certainty]

  no_trajectory:
    description: "Remove trajectory deltas (tests sensitivity to trajectory encoding)"
    exclude_groups: [trajectory]

  no_treatment_history:
    description: "Remove prior antibiotic exposure flags"
    exclude_groups: [treatment_history]

  severity_and_demographics:
    description: "Minimal set — illness severity + demographics only"
    include_groups: [illness_severity, demographics]
