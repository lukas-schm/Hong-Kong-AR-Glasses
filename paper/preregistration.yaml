metadata:
  title: >
    Pre-specification — Antibiotic Continuation Causal Pipeline
    (npj Digital Medicine submission)
  version: "1.0"
  date_locked: "2026-05-21"
  status: >
    Retrospective pre-specification for this manuscript. Future runs of
    the same pipeline on additional databases or related questions will
    use this same locked specification.
  doi: "to be archived on Zenodo upon manuscript acceptance"
  scope_note: >
    Reviewer concern #13: the analysis includes many estimators, feature
    sets, treatment windows, outcomes, and diagnostics. This document
    distinguishes the single primary analysis from secondary / sensitivity
    / exploratory analyses and specifies multiple-testing adjustment.

# ── Primary analysis ────────────────────────────────────────────────────────
# A single planned test. CI exclusion of zero on this single test is the
# 'primary analysis' result reported in the manuscript abstract.
primary_analysis:
  question: >
    Among adult ICU sepsis-3 patients on a first broad-spectrum antibiotic
    started within 48h of ICU admission and alive in the ICU at 72h, what
    is the marginal-risk-difference effect on 28-day mortality of having
    ceased all antibiotics vs continued broad-spectrum, with treatment
    status classified in a +/- 12h window around T0 = 72h?
  cohort:
    database: MIMIC-IV
    version: "2.2"
    eligibility:
      - "adult (>= 18y)"
      - "sepsis-3 flag at ICU admission"
      - "ICU LOS >= 72h"
      - "first broad-spectrum antibiotic started within 48h of ICU admission"
      - "alive in ICU at T0 = 72h after first broad-spectrum"
      - "one stay per subject_id (earliest qualifying)"
      - "NOT comfort-measures-only at T0"        # WS4 addition
  estimand: "marginal risk difference (ATE) at 28d"
  estimator: "DML (EconML) with random-forest propensity + logistic outcome (binary)"
  adjustment_set: "all_confounders (38 variables; see causal_graph.yaml)"
  treatment_window: 12  # +/- hours around T0
  bootstrap_replicates: 500
  ci_method: "EconML asymptotic, fallback to bootstrap-percentile"
  significance_threshold: 0.05

# ── Secondary / sensitivity / exploratory ──────────────────────────────────
secondary_outcomes:
  family: "secondary outcomes (non-mortality)"
  multiple_testing_adjustment: "Benjamini–Hochberg within family"
  outcomes:
    - ventilator_free_days_28
    - vasopressor_free_days_28
    - icu_los_days
    - aki_worsening
    - secondary_infection
    - cdiff_28d

mortality_trajectory_family:
  description: >
    WS11: secondary "mortality-trajectory" family. Same cohort denominator
    as the 28-day primary endpoint (F16 censoring NaN's all horizons
    together). Primary inferential test remains mortality_28d (above);
    the 7d / 14d / 21d endpoints are descriptive secondary endpoints used
    to characterise the trajectory shape. The trajectory chart in the
    CDSS prototype is a visualisation of these four discrete contrasts,
    not a continuous-time causal model.
  endpoints:
    - mortality_7d
    - mortality_14d
    - mortality_21d
  multiple_testing_adjustment: >
    Benjamini-Hochberg across the three descriptive horizons within the
    family. The primary mortality_28d test is not part of this family
    (it has its own significance threshold above).
  estimators:
    point_atE: "AIPW under multinomial GPS (matches Step-5 benchmarks)"
    per_patient_display: "T-Learner per (arm, horizon)"
    ci_method: "joint bootstrap — one cohort resample applied across all
                four horizons so the trajectory CI band is coherent"
  display_gating:
    description: >
      Per-horizon × per-arm calibration probe (extension of the
      deployment-layer calibration in Step 5). Display suppressed for
      (arm, horizon) pairs where the calibration slope falls outside
      [0.4, 1.6] or where the event count is < 30.

secondary_contrasts:
  family: "pairwise treatment contrasts"
  multiple_testing_adjustment: "Bonferroni across three pairwise comparisons"
  contrasts:
    - [continue, deescalate]
    - [continue, cease]
    - [deescalate, cease]

sensitivity_analyses:
  - id: estimator_benchmark
    description: >
      Eight estimators run side-by-side under the same multinomial GPS: DML,
      DRLearner, AIPW, IPTW (stabilised), Overlap-weighted IPTW (ATO),
      TMLE, g-computation, propensity matching (1:k NN with caliper
      0.2 * SD). Reported as a forest plot with estimand annotations.
  - id: feature_set_sweep
    description: >
      All-confounders, Without-infection-markers, Without-trajectory,
      Severity+demographics, Without-clinical-intent (WS4 ablation).
  - id: treatment_window_sweep
    description: "+/- 6, 12, 24 hours around T0."
  - id: t0_anchor_sweep
    description: "T0 at 48h, 72h, 96h, or culture-finalisation time (data-driven)."
  - id: grace_period_sweep
    description: "0, 24, 48 hours grace after T0 for arm classification."
  - id: sustained_treatment
    description: ">= 48h sustained-state arm classification (vs default point-in-time)."
  - id: clipping_threshold_sweep
    description: "Propensity clipping at 0.01, 0.05, 0.10."
  - id: missingness_indicator_ablation
    description: "Re-estimate primary ATE without missingness indicators as predictors."
  - id: competing_risk_finegray
    description: >
      Fine-Gray subdistribution-hazards sensitivity for 28-day mortality
      with ICU discharge alive as a competing event.
  - id: cmo_inclusion_sensitivity
    description: >
      Re-estimate primary ATE keeping CMO-at-T0 patients in the cohort
      (with code_status as adjustment) — used to quantify the sensitivity
      of the headline result to the CMO exclusion choice.
  - id: outcome_clipping
    description: >
      VFD-28, VaPFD-28, ICU LOS predictions clipped vs unclipped — report
      the difference as a footnote per estimator.

exploratory_analyses:
  - id: cate_subgroup
    description: >
      Patient-level CATE estimates with the T-learner; not adjusted for
      multiple testing; reported as exploratory subgroup heatmaps only.
  - id: cdss_prototype
    description: >
      Diagnostic-gated CDSS prototype demonstrating per-patient absolute
      risks with overlap/OOD guardrails; not a deployment claim.

# ── External validation ────────────────────────────────────────────────────
external_validation:
  database: eICU-CRD (PhysioNet)
  cohort: "Same protocol; medication-active arm classification (orders,
           not administrations — measurement-error caveat documented)."
  primary_analysis_run: "continue-vs-cease on eICU"
  per_hospital_subgroup: "AIPW per hospital with n >= 200 stays;
                          forest plot to address reviewer concern #9"

# ── Reporting commitments ──────────────────────────────────────────────────
reporting_commitments:
  - "Every reported effect estimate is annotated with its estimand
     (ATE / ATT / ATO / CATE)."
  - "Every forest-plot row carries: estimator, estimand, contrast,
     CI method, n_a, n_b."
  - "Every diagnostic verdict is gated against the rendered output: if a
     contrast fails an identification probe (overlap or specification-
     stability), the contrast is suppressed in the CDSS prototype."
  - "Per-arm calibration is reported as a deployment-layer probe, not as
     a causal-validity probe."
  - "Coverage is reported via parametric simulation with known ground-truth
     ATE (simulation_coverage.py), not via fold-wise empirical coverage."
  - "All unmeasured-confounder threats are enumerated in the
     unmeasured_confounders register and feed the E-value interpretation."

# ── Reproducibility commitments ────────────────────────────────────────────
reproducibility:
  code_release: >
    Full pipeline source released alongside the manuscript, including
    causal_graph.yaml (confounder schema), treatment_taxonomy.yaml (agent
    classification), this preregistration.yaml (locked spec), and the
    CDSS prototype.
  dataset_access:
    mimic_iv: "PhysioNet credentialed (DOI 10.13026/6mm1-ek67)"
    eicu_crd: "PhysioNet credentialed (eICU-CRD v2.0)"
  random_seed: 42
  reruns: >
    Re-running the pipeline end-to-end on the same hardware yields
    identical tables (subject to RNG seed) and identical figures.
